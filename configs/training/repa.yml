run_name: drugflow_repa_ema
pocket_representation: CA+
virtual_nodes: [0, 10]
flexible: False
flexible_bb: False

train_params:
  logdir: ./runs
  datadir: ./processed_crossdocked
  dataset_suffix: '.with_uma' # load the complex_id-augmented splits (train.with_uma.pt)
  enable_progress_bar: True
  num_sanity_val_steps: 0
  batch_size: 64
  accumulate_grad_batches: 2
  lr: 5.0e-4
  n_epochs: 600
  num_workers: 4
  gpus: 1
  clip_grad: True
  gnina: gnina
  sample_from_clusters: False
  sharded_dataset: False

wandb_params:
  mode: online
  entity:
  group: phase_3

loss_params:
  discrete_loss: VLB
  lambda_x: 1.0
  lambda_h: 50.0
  lambda_e: 50.0
  lambda_chi: null
  lambda_trans: null
  lambda_rot: null
  lambda_clash: null
  timestep_weights: null
  # REPA: atom-level L=0 + L=1 with the heavy projectors — MLP for scalars,
  # GVP (vector-gated) for vectors. The "maximal expressivity" setting.
  rep_alignment: True
  lambda_repa: 1.0
  lambda_repa_vec: 1.0
  align_depth: [3]
  d_rep: 128
  d_rep_vec: 128
  projector_dim: 512
  projector_style: mlp
  projector_vec_style: gvp
  projector_bn: false
  embeddings_dir: /mnt/datasets/CrossDocked/embeddings_hydrogens_uma_s_depth_2
  embedding_type: atom_ligand
  embedding_key: l0_l1

simulation_params:
  n_steps: 5000
  prior_h: marginal
  prior_e: uniform
  predict_final: False
  predict_confidence: False

eval_params:
  skip_val_sampling: True
  eval_epochs: 10
  n_eval_samples: 4
  n_sampling_steps: 500
  eval_batch_size: 16
  visualize_sample_epoch: 10
  n_visualize_samples: 100
  visualize_chain_epoch: 10
  keep_frames: 100
  sample_with_ground_truth_size: True

predictor_params:
  heterogeneous_graph: True
  backbone: gvp
  num_rbf_time: 16
  edge_cutoff_ligand: null
  edge_cutoff_pocket: 10.0
  edge_cutoff_interaction: 10.0
  cycle_counts: True
  spectral_feat: False
  reflection_equivariant: False
  num_rbf: 16
  d_max: 15.0
  self_conditioning: True
  augment_residue_sc: False
  augment_ligand_sc: False
  normal_modes: False
  add_chi_as_feature: False
  angle_act_fn: null
  add_all_atom_diff: False

  gvp_params:
    n_layers: 5
    node_h_dim: [ 128, 32 ]
    edge_h_dim: [ 128, 32 ]
    dropout: 0.0
    vector_gate: True

ema:
  decay: 0.999
